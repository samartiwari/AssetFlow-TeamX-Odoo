services:
  db:
    image: postgres:16
    container_name: assetflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
      POSTGRES_DB: assetflow
    ports:
      - "5434:5432"
    volumes:
      - assetflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: assetflow-adminer
    restart: unless-stopped
    ports:
      - "8001:8080"
    depends_on:
      - db

volumes:
  assetflow-pgdata:
